<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>libgnss++ Solution Viewer</title>
  <meta name="description" content="Interactive rtkplot-style GNSS solution viewer with sample Odaiba driving data.">
  <style>
    :root {
      --bg: #f4f1e8; --paper: #fffdf8; --ink: #1f2937; --muted: #6b7280;
      --line: #d6d0c4; --accent: #0f766e;
      --fixed: #2ecc71; --float: #f39c12; --dgps: #3498db; --spp: #e74c3c;
      --gps: #2563eb; --glo: #dc2626; --gal: #16a34a; --bds: #d97706; --qzss: #7c3aed;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "IBM Plex Sans","Inter",system-ui,sans-serif;
      color: var(--ink); background: var(--bg); overflow-x: hidden;
    }
    nav { position: sticky; top: 0; z-index: 100; background: rgba(255,253,248,0.9);
      backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
    .nav-inner { max-width: 1440px; margin: 0 auto; display: flex;
      align-items: center; justify-content: space-between; padding: 8px 16px; }
    .nav-brand { font-weight: 800; font-size: 1.1rem; color: var(--accent); text-decoration: none; }
    .nav-links { display: flex; gap: 16px; }
    .nav-links a { font-size: 0.88rem; font-weight: 600; color: var(--muted); text-decoration: none; }
    .nav-links a:hover { color: var(--accent); }

    #status-bar-wrap { padding: 4px 8px 0; max-width: 1440px; margin: 0 auto; }
    #status-bar { width: 100%; height: 14px; border-radius: 7px; cursor: pointer;
      border: 1px solid var(--line); }

    .toolbar { max-width: 1440px; margin: 0 auto; padding: 6px 8px;
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .toolbar-group { display: flex; gap: 3px; align-items: center; }
    .toolbar-label { font-size: 0.75rem; color: var(--muted); font-weight: 600;
      margin-right: 2px; white-space: nowrap; }
    .toolbar-sep { width: 1px; height: 20px; background: var(--line); margin: 0 6px; }
    .tbtn { padding: 3px 10px; border-radius: 999px; border: 1px solid var(--line);
      background: rgba(255,255,255,0.7); cursor: pointer; font-size: 0.78rem;
      font-weight: 600; color: var(--muted); transition: all 0.12s; white-space: nowrap; }
    .tbtn:hover { border-color: var(--accent); color: var(--accent); }
    .tbtn.on { color: #fff; border-color: transparent; }
    .tbtn[data-status="FIXED"].on { background: var(--fixed); }
    .tbtn[data-status="FLOAT"].on { background: var(--float); }
    .tbtn[data-status="DGPS"].on { background: var(--dgps); }
    .tbtn[data-status="SPP"].on { background: var(--spp); }
    .tbtn[data-sys="GPS"].on { background: var(--gps); }
    .tbtn[data-sys="GLONASS"].on { background: var(--glo); }
    .tbtn[data-sys="Galileo"].on { background: var(--gal); }
    .tbtn[data-sys="BeiDou"].on { background: var(--bds); }
    .tbtn[data-sys="QZSS"].on { background: var(--qzss); }
    .tbtn-reset { background: rgba(255,255,255,0.7); }

    #epoch-info { font-size: 0.78rem; color: var(--muted); margin-left: auto;
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    #epoch-info .val { font-weight: 700; color: var(--ink); }
    #epoch-info .status-badge { padding: 1px 7px; border-radius: 999px;
      font-size: 0.72rem; font-weight: 700; color: #fff; }

    #main-grid { max-width: 1440px; margin: 0 auto; padding: 6px 8px 16px;
      display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto auto;
      gap: 8px; }
    .card { background: rgba(255,255,255,0.88); border: 1px solid var(--line);
      border-radius: 14px; padding: 8px; overflow: hidden;
      box-shadow: 0 4px 12px rgba(31,41,55,0.04); }
    .card-title { font-size: 0.82rem; font-weight: 700; color: var(--muted);
      margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
    .card-title .hint { font-weight: 500; font-size: 0.75rem; }

    #gt-card { grid-column: 1; grid-row: 1 / 3; }
    #enu-card { grid-column: 2; grid-row: 1; }
    #vel-card { grid-column: 2; grid-row: 2; }
    #satcount-card { grid-column: 2; grid-row: 3; }
    #bl-card { grid-column: 1; grid-row: 3; }
    #ratio-card { grid-column: 1; grid-row: 4; }
    #dop-card { grid-column: 2; grid-row: 4; }
    #sky-card { grid-column: 1; grid-row: 5; }
    #stats-card { grid-column: 2; grid-row: 5; }
    #snr-card { grid-column: 1 / 3; grid-row: 6; }

    .card canvas { width: 100%; display: block; border-radius: 8px; }
    #gt-canvas { height: 480px; cursor: crosshair; }
    .enu-canvas { height: 100px; }
    .vel-canvas { height: 80px; }
    #satcount-canvas { height: 140px; }
    #bl-canvas { height: 160px; }
    #ratio-canvas { height: 160px; }
    #dop-canvas { height: 160px; }
    #sky-canvas { height: 320px; }
    #snr-canvas { height: 160px; }

    /* Stats panel */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .stat-item { background: var(--paper); border: 1px solid var(--line);
      border-radius: 10px; padding: 8px 10px; }
    .stat-item .sk { font-size: 0.72rem; color: var(--muted); }
    .stat-item .sv { font-size: 1rem; font-weight: 700; }

    /* Drag & Drop overlay */
    #drop-overlay { display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(15,118,110,0.12); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; }
    #drop-overlay.active { display: flex; }
    #drop-box { background: #fff; border: 3px dashed var(--accent);
      border-radius: 24px; padding: 48px 64px; text-align: center; }
    #drop-box h2 { color: var(--accent); font-size: 1.4rem; margin-bottom: 8px; }
    #drop-box p { color: var(--muted); font-size: 0.95rem; }

    .legend { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 0; }
    .legend-item { display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.75rem; color: var(--muted); }
    .sw { width: 10px; height: 10px; border-radius: 999px; }

    @media (max-width: 800px) {
      #main-grid { grid-template-columns: 1fr; }
      #gt-card { grid-row: auto; }
      #gt-canvas { height: 320px; }
    }
  </style>
</head>
<body>
  <nav><div class="nav-inner">
    <a href="../" class="nav-brand">libgnss++ viewer</a>
    <div class="nav-links">
      <a href="../">Home</a><a href="../docs/">Docs</a>
      <a href="https://github.com/rsasaki0109/gnssplusplus-library" target="_blank" rel="noreferrer">GitHub</a>
    </div>
  </div></nav>

  <div id="drop-overlay"><div id="drop-box"><h2>Drop .pos file</h2><p>LibGNSS++ or RTKLIB format supported</p></div></div>

  <div id="status-bar-wrap"><canvas id="status-bar"></canvas></div>

  <div class="toolbar">
    <div class="toolbar-group">
      <span class="toolbar-label">Status</span>
      <button class="tbtn on" data-status="FIXED">FIX</button>
      <button class="tbtn on" data-status="FLOAT">FLOAT</button>
      <button class="tbtn on" data-status="DGPS">DGPS</button>
      <button class="tbtn on" data-status="SPP">SPP</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <span class="toolbar-label">System</span>
      <button class="tbtn on" data-sys="GPS">GPS</button>
      <button class="tbtn on" data-sys="GLONASS">GLO</button>
      <button class="tbtn on" data-sys="Galileo">GAL</button>
      <button class="tbtn on" data-sys="BeiDou">BDS</button>
      <button class="tbtn on" data-sys="QZSS">QZS</button>
    </div>
    <div class="toolbar-sep"></div>
    <button class="tbtn tbtn-reset" id="btn-reset">Reset View</button>
    <div id="epoch-info"></div>
  </div>

  <div id="main-grid">
    <div class="card" id="gt-card">
      <div class="card-title">Ground Track <span class="hint">scroll=zoom, drag=pan</span></div>
      <canvas id="gt-canvas"></canvas>
      <div class="legend" id="status-legend"></div>
    </div>
    <div class="card" id="enu-card">
      <div class="card-title">Position E / N / U</div>
      <canvas class="enu-canvas" id="east-canvas"></canvas>
      <canvas class="enu-canvas" id="north-canvas"></canvas>
      <canvas class="enu-canvas" id="up-canvas"></canvas>
    </div>
    <div class="card" id="vel-card">
      <div class="card-title">Velocity E / N / U <span class="hint">m/s</span></div>
      <canvas class="vel-canvas" id="ve-canvas"></canvas>
      <canvas class="vel-canvas" id="vn-canvas"></canvas>
      <canvas class="vel-canvas" id="vu-canvas"></canvas>
    </div>
    <div class="card" id="satcount-card">
      <div class="card-title">Satellites</div>
      <canvas id="satcount-canvas"></canvas>
    </div>
    <div class="card" id="bl-card">
      <div class="card-title">Baseline Length <span class="hint">m</span></div>
      <canvas id="bl-canvas"></canvas>
    </div>
    <div class="card" id="ratio-card">
      <div class="card-title">Ambiguity Ratio</div>
      <canvas id="ratio-canvas"></canvas>
    </div>
    <div class="card" id="dop-card">
      <div class="card-title">DOP</div>
      <canvas id="dop-canvas"></canvas>
      <div class="legend" id="dop-legend"></div>
    </div>
    <div class="card" id="sky-card">
      <div class="card-title">Skyplot</div>
      <canvas id="sky-canvas"></canvas>
    </div>
    <div class="card" id="stats-card">
      <div class="card-title">Statistics</div>
      <div class="stats-grid" id="stats-grid"></div>
    </div>
    <div class="card" id="snr-card">
      <div class="card-title">SNR per Satellite</div>
      <canvas id="snr-canvas"></canvas>
    </div>
  </div>

const _SM = {1:"SPP",2:"DGPS",3:"FLOAT",4:"FIXED"};
const EPOCHS = _RD.tow.map((t,i) => {

});

// Compute velocity from position differences
for(let i=0;i<EPOCHS.length;i++){
  if(i<EPOCHS.length-1){
    const dt=EPOCHS[i+1].tow-EPOCHS[i].tow;
    if(dt>0){EPOCHS[i].ve=(EPOCHS[i+1].east-EPOCHS[i].east)/dt;
      EPOCHS[i].vn=(EPOCHS[i+1].north-EPOCHS[i].north)/dt;
      EPOCHS[i].vu=(EPOCHS[i+1].up-EPOCHS[i].up)/dt;}
    else{EPOCHS[i].ve=0;EPOCHS[i].vn=0;EPOCHS[i].vu=0;}
  }else{EPOCHS[i].ve=0;EPOCHS[i].vn=0;EPOCHS[i].vu=0;}
}

// Satellite visibility (static snapshot)
function mkRng(seed){let s=seed;return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646;};}
const R=mkRng(42);
const SATS=[];
[{sys:"GPS",pre:"G",n:12},{sys:"GLONASS",pre:"R",n:8},{sys:"Galileo",pre:"E",n:10},{sys:"BeiDou",pre:"C",n:14},{sys:"QZSS",pre:"J",n:4}].forEach(d=>{
  for(let i=0;i<d.n;i++){
    const az=((i/d.n)*360+R()*30)%360, el=d.sys==="QZSS"?(50+R()*35):(5+R()*75);
    SATS.push({prn:d.pre+(i+1).toString().padStart(2,"0"),sys:d.sys,az,el,snr:22+R()*28});
  }
});

// ===== H. App state =====
const S={
  hover:-1,
  visStatus:{FIXED:true,FLOAT:true,DGPS:true,SPP:true},
  visSys:{GPS:true,GLONASS:true,Galileo:true,BeiDou:true,QZSS:true},
  gt:{cx:0,cy:0,scale:1,drag:false,dx:0,dy:0,lx:0,ly:0}
};
// Compute initial ground track bounds
(function(){
  let mnE=Infinity,mxE=-Infinity,mnN=Infinity,mxN=-Infinity;
  for(const e of EPOCHS){mnE=Math.min(mnE,e.east);mxE=Math.max(mxE,e.east);mnN=Math.min(mnN,e.north);mxN=Math.max(mxN,e.north);}
  S.gt.cx=(mnE+mxE)/2; S.gt.cy=(mnN+mxN)/2;
  S.gt.scale=Math.max(mxE-mnE,mxN-mnN,1)*1.15;
  S.gt.initCx=S.gt.cx; S.gt.initCy=S.gt.cy; S.gt.initScale=S.gt.scale;
})();

// ===== I. Canvas helpers =====
function prep(canvas){
  const rect=canvas.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  canvas.width=rect.width*dpr; canvas.height=rect.height*dpr;
  const ctx=canvas.getContext("2d"); ctx.scale(dpr,dpr);
  return{ctx,w:rect.width,h:rect.height};
}

// ===== J. Draw Ground Track =====
function drawGT(canvas){
  const{ctx,w,h}=prep(canvas);
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h);
  const pad=8;
  const pw=w-pad*2, ph=h-pad*2;
  const sc=S.gt.scale;
  const toX=e=>pad+pw/2+(e-S.gt.cx)/sc*pw;
  const toY=n=>pad+ph/2-(n-S.gt.cy)/sc*ph;

  // Grid
  ctx.strokeStyle="#e5e7eb"; ctx.lineWidth=0.5;
  const gridStep=Math.pow(10,Math.floor(Math.log10(sc*0.3)));
  const gs=gridStep>0?gridStep:100;
  const startE=Math.floor((S.gt.cx-sc/2)/gs)*gs;
  const startN=Math.floor((S.gt.cy-sc/2)/gs)*gs;
  ctx.font="10px sans-serif"; ctx.fillStyle="#bbb"; ctx.textAlign="center";
  for(let e=startE;e<=S.gt.cx+sc;e+=gs){
    const x=toX(e);
    if(x>pad&&x<w-pad){ctx.beginPath();ctx.moveTo(x,pad);ctx.lineTo(x,h-pad);ctx.stroke();
      ctx.fillText(e.toFixed(0)+"m",x,h-1);}
  }
  ctx.textAlign="right";
  for(let n=startN;n<=S.gt.cy+sc;n+=gs){
    const y=toY(n);
    if(y>pad&&y<h-pad){ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke();
      ctx.fillText(n.toFixed(0),pad-2,y+3);}
  }

  // Path line
  ctx.strokeStyle="#d1d5db"; ctx.lineWidth=1;
  ctx.beginPath();
  for(let i=0;i<EPOCHS.length;i++){
    if(!S.visStatus[EPOCHS[i].status])continue;
    const x=toX(EPOCHS[i].east),y=toY(EPOCHS[i].north);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Points by status (draw SPP first, FIXED last = on top)
  const order=["SPP","DGPS","FLOAT","FIXED"];
  for(const st of order){
    if(!S.visStatus[st])continue;
    ctx.fillStyle=SC[st];
    for(let i=0;i<EPOCHS.length;i++){
      if(EPOCHS[i].status!==st)continue;
      const x=toX(EPOCHS[i].east),y=toY(EPOCHS[i].north);
      if(x<-10||x>w+10||y<-10||y>h+10)continue;
      ctx.beginPath(); ctx.arc(x,y,2.5,0,Math.PI*2); ctx.fill();
    }
  }

  // Hover highlight
  if(S.hover>=0&&S.hover<EPOCHS.length){
    const ep=EPOCHS[S.hover];
    const hx=toX(ep.east),hy=toY(ep.north);
    ctx.strokeStyle="rgba(31,41,55,0.3)"; ctx.lineWidth=0.5; ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(hx,pad);ctx.lineTo(hx,h-pad);ctx.stroke();
    ctx.beginPath();ctx.moveTo(pad,hy);ctx.lineTo(w-pad,hy);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(hx,hy,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=SC[ep.status]; ctx.beginPath(); ctx.arc(hx,hy,5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle="#1f2937"; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(hx,hy,5,0,Math.PI*2); ctx.stroke();
  }

  // Scale bar
  const barM=gs;
  const barPx=barM/sc*pw;
  ctx.fillStyle="#6b7280"; ctx.fillRect(w-pad-barPx-4,h-pad-12,barPx,3);
  ctx.font="9px sans-serif"; ctx.textAlign="right";
  ctx.fillText(barM>=1000?(barM/1000)+"km":barM+"m",w-pad-4,h-pad-15);
}

// ===== K. Draw Time Series =====
function drawTS(canvas,key,label,yAuto,color){
  const{ctx,w,h}=prep(canvas);
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h);
  const pL=44,pR=8,pT=14,pB=16;
  const pw=w-pL-pR, ph=h-pT-pB;

  let mn=Infinity,mx=-Infinity;
  for(const e of EPOCHS){if(!S.visStatus[e.status])continue;const v=e[key];mn=Math.min(mn,v);mx=Math.max(mx,v);}
  if(!isFinite(mn)){mn=-1;mx=1;}
  if(yAuto){const span=Math.max(mx-mn,0.01)*0.08;mn-=span;mx+=span;}
  else{const am=Math.max(Math.abs(mn),Math.abs(mx),0.01)*1.1;mn=-am;mx=am;}

  const toX=i=>pL+(i/(EPOCHS.length-1))*pw;
  const toY=v=>pT+ph-(v-mn)/(mx-mn)*ph;

  // Grid
  ctx.strokeStyle="#e5e7eb"; ctx.lineWidth=0.5;
  for(let i=0;i<=3;i++){
    const y=pT+ph*i/3;
    ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(w-pR,y);ctx.stroke();
    const val=mx-(mx-mn)*i/3;
    ctx.fillStyle="#aaa"; ctx.font="9px sans-serif"; ctx.textAlign="right";
    ctx.fillText(Math.abs(val)<10?val.toFixed(2):val.toFixed(0),pL-3,y+3);
  }
  // Zero line
  if(mn<0&&mx>0){
    const zy=toY(0);
    ctx.strokeStyle="#bbb"; ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(pL,zy);ctx.lineTo(w-pR,zy);ctx.stroke();
  }

  // Data
  for(const st of ["SPP","DGPS","FLOAT","FIXED"]){
    if(!S.visStatus[st])continue;
    ctx.fillStyle=color||SC[st];
    for(let i=0;i<EPOCHS.length;i++){
      if(EPOCHS[i].status!==st)continue;
      const x=toX(i),y=toY(EPOCHS[i][key]);
      ctx.fillRect(x-0.8,y-0.8,1.6,1.6);
    }
  }

  // Label
  ctx.fillStyle="#6b7280"; ctx.font="10px sans-serif"; ctx.textAlign="left";
  ctx.fillText(label,pL+4,pT+10);

  // Crosshair
  if(S.hover>=0){
    const hx=toX(S.hover);
    ctx.strokeStyle="rgba(31,41,55,0.45)"; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(hx,pT);ctx.lineTo(hx,pT+ph);ctx.stroke();
    ctx.setLineDash([]);
    if(S.visStatus[EPOCHS[S.hover].status]){
      const hy=toY(EPOCHS[S.hover][key]);
      ctx.fillStyle=SC[EPOCHS[S.hover].status];
      ctx.beginPath();ctx.arc(hx,hy,4,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle="#fff";ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(hx,hy,4,0,Math.PI*2);ctx.stroke();
      // Value label
      ctx.fillStyle="#1f2937"; ctx.font="bold 10px sans-serif"; ctx.textAlign="left";
      ctx.fillText(EPOCHS[S.hover][key].toFixed(3)+"m",hx+7,hy-4);
    }
  }
}

// ===== L. Status Bar =====
function drawStatusBar(canvas){
  const{ctx,w,h}=prep(canvas);
  const n=EPOCHS.length;
  for(let i=0;i<n;i++){
    const x=i/n*w, bw=Math.max(w/n,1);
    ctx.fillStyle=SC[EPOCHS[i].status];
    ctx.fillRect(x,0,bw+0.5,h);
  }
  if(S.hover>=0){
    const hx=S.hover/n*w;
    ctx.fillStyle="#1f2937";
    ctx.beginPath();ctx.moveTo(hx-4,h);ctx.lineTo(hx+4,h);ctx.lineTo(hx,h-5);ctx.closePath();ctx.fill();
    ctx.fillRect(hx-0.5,0,1,h);
  }
}

// ===== M. Satellite Count =====
function drawSatCount(canvas){
  const{ctx,w,h}=prep(canvas);
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h);
  const pL=36,pR=8,pT=10,pB=14;
  const pw=w-pL-pR, ph=h-pT-pB;
  const maxSat=35;
  const bw=Math.max(pw/EPOCHS.length,0.8);
  const toX=i=>pL+(i/EPOCHS.length)*pw;
  const toY=v=>pT+ph-v/maxSat*ph;

  // Grid
  ctx.strokeStyle="#e5e7eb";ctx.lineWidth=0.5;
  for(let v=0;v<=maxSat;v+=10){
    const y=toY(v);
    ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(w-pR,y);ctx.stroke();
    ctx.fillStyle="#aaa";ctx.font="9px sans-serif";ctx.textAlign="right";
    ctx.fillText(v,pL-3,y+3);
  }

  // Stacked bars
  const sysKeys=["gps","glo","gal","bds","qzss"];
  const sysColors=[SYS_C.GPS,SYS_C.GLONASS,SYS_C.Galileo,SYS_C.BeiDou,SYS_C.QZSS];
  const sysNames=["GPS","GLONASS","Galileo","BeiDou","QZSS"];
  for(let i=0;i<EPOCHS.length;i++){
    if(!S.visStatus[EPOCHS[i].status])continue;
    let base=0;
    for(let s=0;s<5;s++){
      if(!S.visSys[sysNames[s]])continue;
      const val=EPOCHS[i][sysKeys[s]];
      const y0=toY(base+val), y1=toY(base);
      ctx.fillStyle=sysColors[s];
      ctx.fillRect(toX(i),y0,bw,y1-y0);
      base+=val;
    }
  }

  // Crosshair
  if(S.hover>=0){
    const hx=toX(S.hover);
    ctx.strokeStyle="rgba(31,41,55,0.45)";ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(hx,pT);ctx.lineTo(hx,pT+ph);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle="#1f2937";ctx.font="bold 10px sans-serif";ctx.textAlign="left";
    ctx.fillText(EPOCHS[S.hover].nsat+" sats",hx+6,pT+12);
  }
}

// ===== N. DOP =====
function drawDOP(canvas){
  const{ctx,w,h}=prep(canvas);
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h);
  const pL=36,pR=8,pT=10,pB=14;
  const pw=w-pL-pR, ph=h-pT-pB;
  let mx=0;
  for(const e of EPOCHS)mx=Math.max(mx,e.pdop,e.hdop,e.vdop);
  mx=Math.ceil(mx*1.1);

  const toX=i=>pL+(i/(EPOCHS.length-1))*pw;
  const toY=v=>pT+ph-v/mx*ph;

  // Grid
  ctx.strokeStyle="#e5e7eb";ctx.lineWidth=0.5;
  for(let v=0;v<=mx;v+=Math.max(1,Math.floor(mx/4))){
    const y=toY(v);
    ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(w-pR,y);ctx.stroke();
    ctx.fillStyle="#aaa";ctx.font="9px sans-serif";ctx.textAlign="right";ctx.fillText(v,pL-3,y+3);
  }

  // Lines
  const lines=[["pdop","#e74c3c"],["hdop","#2563eb"],["vdop","#16a34a"]];
  for(const[key,col]of lines){
    ctx.strokeStyle=col; ctx.lineWidth=1.2;
    ctx.beginPath();
    for(let i=0;i<EPOCHS.length;i++){
      if(!S.visStatus[EPOCHS[i].status])continue;
      const x=toX(i),y=toY(EPOCHS[i][key]);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  // Crosshair
  if(S.hover>=0){
    const hx=toX(S.hover);
    ctx.strokeStyle="rgba(31,41,55,0.45)";ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(hx,pT);ctx.lineTo(hx,pT+ph);ctx.stroke();
    ctx.setLineDash([]);
    const ep=EPOCHS[S.hover];
    ctx.font="bold 9px sans-serif";ctx.textAlign="left";
    ctx.fillStyle="#e74c3c";ctx.fillText("P:"+ep.pdop.toFixed(1),hx+5,pT+10);
    ctx.fillStyle="#2563eb";ctx.fillText("H:"+ep.hdop.toFixed(1),hx+5,pT+22);
    ctx.fillStyle="#16a34a";ctx.fillText("V:"+ep.vdop.toFixed(1),hx+5,pT+34);
  }
}

// ===== O. Skyplot =====
function drawSky(canvas){
  const{ctx,w,h}=prep(canvas);
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h);
  const cx=w/2,cy=h/2,rad=Math.min(w,h)*0.42;

  // Rings
  ctx.strokeStyle="#e0e0e0"; ctx.lineWidth=0.8;
  for(const f of [0.333,0.667,1.0]){ctx.beginPath();ctx.arc(cx,cy,rad*f,0,Math.PI*2);ctx.stroke();}
  ctx.beginPath();ctx.moveTo(cx,cy-rad);ctx.lineTo(cx,cy+rad);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-rad,cy);ctx.lineTo(cx+rad,cy);ctx.stroke();

  // Cardinal
  ctx.fillStyle="#888";ctx.font="12px sans-serif";ctx.textAlign="center";
  ctx.fillText("N",cx,cy-rad-6);ctx.fillText("S",cx,cy+rad+14);
  ctx.textAlign="left";ctx.fillText("E",cx+rad+6,cy+4);
  ctx.textAlign="right";ctx.fillText("W",cx-rad-6,cy+4);

  // Elev labels
  ctx.fillStyle="#bbb";ctx.font="9px sans-serif";ctx.textAlign="left";
  ctx.fillText("60",cx+2,cy-rad*0.333+10);
  ctx.fillText("30",cx+2,cy-rad*0.667+10);

  // Satellites
  for(const s of SATS){
    if(!S.visSys[s.sys])continue;
    const az=s.az*Math.PI/180;
    const r=rad*(90-s.el)/90;
    const x=cx+r*Math.sin(az), y=cy-r*Math.cos(az);
    const alpha=Math.max(0.45,Math.min(1,s.snr/45));
    ctx.globalAlpha=alpha;
    ctx.fillStyle=SYS_C[s.sys];
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.fillStyle="#555";ctx.font="8px sans-serif";ctx.textAlign="left";
    ctx.fillText(s.prn,x+7,y+3);
  }

  // Legend
  let lx=8,ly=h-8;
  ctx.font="10px sans-serif";
  for(const sys of SYS_KEYS){
    if(!S.visSys[sys])continue;
    ctx.fillStyle=SYS_C[sys];ctx.fillRect(lx,ly-8,10,10);
    ctx.fillStyle="#666";ctx.textAlign="left";ctx.fillText(sys,lx+13,ly);
    lx+=ctx.measureText(sys).width+24;
  }
}

// ===== P1. Baseline Length =====
function drawBaseline(canvas){
  const{ctx,w,h}=prep(canvas);
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h);
  const pL=52,pR=8,pT=10,pB=14;
  const pw=w-pL-pR, ph=h-pT-pB;
  let mn=Infinity,mx=-Infinity;
  for(const e of EPOCHS){if(!S.visStatus[e.status])continue;if(e.bl>0){mn=Math.min(mn,e.bl);mx=Math.max(mx,e.bl);}}
  if(!isFinite(mn)){mn=0;mx=100;}
  const span=(mx-mn)*0.05;mn-=span;mx+=span;
  const toX=i=>pL+(i/(EPOCHS.length-1))*pw;
  const toY=v=>pT+ph-(v-mn)/(mx-mn)*ph;

  ctx.strokeStyle="#e5e7eb";ctx.lineWidth=0.5;
  for(let i=0;i<=3;i++){const y=pT+ph*i/3;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(w-pR,y);ctx.stroke();
    const val=mx-(mx-mn)*i/3;ctx.fillStyle="#aaa";ctx.font="9px sans-serif";ctx.textAlign="right";ctx.fillText(val.toFixed(0),pL-3,y+3);}

  ctx.strokeStyle="#0f766e";ctx.lineWidth=1.2;ctx.beginPath();
  let started=false;
  for(let i=0;i<EPOCHS.length;i++){
    if(!S.visStatus[EPOCHS[i].status]||EPOCHS[i].bl<=0)continue;
    const x=toX(i),y=toY(EPOCHS[i].bl);
    started?ctx.lineTo(x,y):ctx.moveTo(x,y);started=true;
  }
  ctx.stroke();

  ctx.fillStyle="#6b7280";ctx.font="10px sans-serif";ctx.textAlign="left";ctx.fillText("Baseline (m)",pL+4,pT+10);
  if(S.hover>=0){const hx=toX(S.hover);ctx.strokeStyle="rgba(31,41,55,0.45)";ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(hx,pT);ctx.lineTo(hx,pT+ph);ctx.stroke();ctx.setLineDash([]);
    if(EPOCHS[S.hover].bl>0){ctx.fillStyle="#1f2937";ctx.font="bold 10px sans-serif";ctx.fillText(EPOCHS[S.hover].bl.toFixed(1)+"m",hx+6,pT+10);}}
}

// ===== P2. Ambiguity Ratio =====
function drawRatio(canvas){
  const{ctx,w,h}=prep(canvas);
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h);
  const pL=44,pR=8,pT=10,pB=14;
  const pw=w-pL-pR, ph=h-pT-pB;
  let mx=0;
  for(const e of EPOCHS)if(S.visStatus[e.status])mx=Math.max(mx,e.ratio);
  mx=Math.max(mx,5)*1.1;
  const toX=i=>pL+(i/(EPOCHS.length-1))*pw;
  const toY=v=>pT+ph-v/mx*ph;

  ctx.strokeStyle="#e5e7eb";ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){const y=pT+ph*i/4;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(w-pR,y);ctx.stroke();
    const val=mx*(1-i/4);ctx.fillStyle="#aaa";ctx.font="9px sans-serif";ctx.textAlign="right";ctx.fillText(val.toFixed(1),pL-3,y+3);}

  // Threshold line at 3.0
  const thY=toY(3.0);
  if(thY>pT&&thY<pT+ph){ctx.strokeStyle="rgba(231,76,60,0.5)";ctx.lineWidth=1;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(pL,thY);ctx.lineTo(w-pR,thY);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle="#e74c3c";ctx.font="9px sans-serif";ctx.textAlign="left";ctx.fillText("threshold=3.0",pL+4,thY-4);}

  // Ratio points
  for(const st of ["SPP","DGPS","FLOAT","FIXED"]){
    if(!S.visStatus[st])continue;
    ctx.fillStyle=SC[st];
    for(let i=0;i<EPOCHS.length;i++){
      if(EPOCHS[i].status!==st||EPOCHS[i].ratio<=0)continue;
      const x=toX(i),y=toY(EPOCHS[i].ratio);
      ctx.fillRect(x-1,y-1,2.5,2.5);
    }
  }

  ctx.fillStyle="#6b7280";ctx.font="10px sans-serif";ctx.textAlign="left";ctx.fillText("Ratio",pL+4,pT+10);
  if(S.hover>=0){const hx=toX(S.hover);ctx.strokeStyle="rgba(31,41,55,0.45)";ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(hx,pT);ctx.lineTo(hx,pT+ph);ctx.stroke();ctx.setLineDash([]);
    if(EPOCHS[S.hover].ratio>0){ctx.fillStyle="#1f2937";ctx.font="bold 10px sans-serif";ctx.fillText(EPOCHS[S.hover].ratio.toFixed(1),hx+6,pT+10);}}
}

// ===== P3. Statistics Panel =====
function updateStats(){
  const el=document.getElementById("stats-grid");
  const n=EPOCHS.length;
  const fixN=EPOCHS.filter(e=>e.status==="FIXED").length;
  const floatN=EPOCHS.filter(e=>e.status==="FLOAT").length;
  const sppN=EPOCHS.filter(e=>e.status==="SPP").length;
  const dgpsN=n-fixN-floatN-sppN;

  // Horizontal RMS (E,N)
  let sumH2=0,sumU2=0,hErrors=[];
  for(const e of EPOCHS){
    if(e.status==="FIXED"){const h2=e.east*e.east+e.north*e.north;sumH2+=h2;hErrors.push(Math.sqrt(h2));sumU2+=e.up*e.up;}
  }
  const hRms=fixN>0?Math.sqrt(sumH2/fixN):NaN;
  const vRms=fixN>0?Math.sqrt(sumU2/fixN):NaN;
  hErrors.sort((a,b)=>a-b);
  const p95=hErrors.length>0?hErrors[Math.floor(hErrors.length*0.95)]:NaN;

  // Distance & speed
  let dist=0;
  for(let i=1;i<n;i++){const de=EPOCHS[i].east-EPOCHS[i-1].east,dn=EPOCHS[i].north-EPOCHS[i-1].north;dist+=Math.sqrt(de*de+dn*dn);}
  const duration=n>1?EPOCHS[n-1].tow-EPOCHS[0].tow:0;
  const avgSpd=duration>0?dist/duration:0;
  const avgSats=EPOCHS.reduce((s,e)=>s+e.nsat,0)/n;
  const avgPdop=EPOCHS.reduce((s,e)=>s+e.pdop,0)/n;

  const items=[
    ["Epochs",n.toLocaleString()],
    ["Duration",duration>0?(duration/60).toFixed(1)+" min":"--"],
    ["FIX",fixN+" ("+(fixN/n*100).toFixed(1)+"%)"],
    ["FLOAT",floatN+" ("+(floatN/n*100).toFixed(1)+"%)"],
    ["SPP",sppN+" ("+(sppN/n*100).toFixed(1)+"%)"],
    ["DGPS",dgpsN>0?dgpsN+" ("+(dgpsN/n*100).toFixed(1)+"%)":"0"],
    ["H-RMS (FIX)",isNaN(hRms)?"--":hRms.toFixed(3)+" m"],
    ["V-RMS (FIX)",isNaN(vRms)?"--":vRms.toFixed(3)+" m"],
    ["P95-H (FIX)",isNaN(p95)?"--":p95.toFixed(3)+" m"],
    ["Avg Sats",avgSats.toFixed(1)],
    ["Avg PDOP",avgPdop.toFixed(2)],
    ["Distance",(dist/1000).toFixed(2)+" km"],
    ["Avg Speed",(avgSpd*3.6).toFixed(1)+" km/h"],
    ["Sample Rate",(n/Math.max(duration,1)).toFixed(1)+" Hz"],
  ];
  el.innerHTML=items.map(([k,v])=>`<div class="stat-item"><div class="sk">${k}</div><div class="sv">${v}</div></div>`).join("");
}

// ===== P4. SNR Bar Chart =====
function drawSNR(canvas){
  const{ctx,w,h}=prep(canvas);
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h);
  const pL=28,pR=8,pT=8,pB=28;
  const pw=w-pL-pR, ph=h-pT-pB;
  const filtered=SATS.filter(s=>S.visSys[s.sys]);
  if(!filtered.length)return;
  const bw=Math.min(pw/filtered.length-1,18);
  const gap=(pw-bw*filtered.length)/(filtered.length+1);
  const maxSNR=55;

  // Grid
  ctx.strokeStyle="#e5e7eb";ctx.lineWidth=0.5;
  for(const v of [20,30,40,50]){
    const y=pT+ph-v/maxSNR*ph;
    ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(w-pR,y);ctx.stroke();
    ctx.fillStyle="#bbb";ctx.font="9px sans-serif";ctx.textAlign="right";
    ctx.fillText(v,pL-3,y+3);
  }

  // Bars
  for(let i=0;i<filtered.length;i++){
    const s=filtered[i];
    const x=pL+gap+(bw+gap)*i;
    const bh=s.snr/maxSNR*ph;
    ctx.fillStyle=SYS_C[s.sys];
    ctx.fillRect(x,pT+ph-bh,bw,bh);
    // PRN label
    ctx.save();ctx.translate(x+bw/2,h-pB+10);ctx.rotate(-Math.PI/4);
    ctx.fillStyle="#888";ctx.font="8px sans-serif";ctx.textAlign="right";
    ctx.fillText(s.prn,0,0);ctx.restore();
  }
}

// ===== R. Epoch info =====
function towToHMS(tow){
  const s=tow%86400, hh=Math.floor(s/3600), mm=Math.floor((s%3600)/60), ss=s%60;
  return `${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
}
function updateEpochInfo(){
  const el=document.getElementById("epoch-info");
  if(S.hover<0||S.hover>=EPOCHS.length){el.innerHTML="<span>Hover on any panel</span>";return;}
  const e=EPOCHS[S.hover];
  const bg=SC[e.status];
  el.innerHTML=`
    <span>${towToHMS(e.tow)} (epoch ${S.hover})</span>
    <span>E:<span class="val">${e.east.toFixed(3)}</span></span>
    <span>N:<span class="val">${e.north.toFixed(3)}</span></span>
    <span>U:<span class="val">${e.up.toFixed(3)}</span></span>
    <span class="status-badge" style="background:${bg}">${e.status}</span>
    <span>Sats:<span class="val">${e.nsat}</span></span>
    <span>PDOP:<span class="val">${e.pdop.toFixed(1)}</span></span>`;
}

// ===== S. Event binding =====
function epochFromMouseX(canvas,e){
  const rect=canvas.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const pL=44,pR=8;
  const frac=(x-pL)/(rect.width-pL-pR);
  return Math.max(0,Math.min(EPOCHS.length-1,Math.round(frac*(EPOCHS.length-1))));
}

function bindTS(id){
  const c=document.getElementById(id);
  c.addEventListener("mousemove",e=>{S.hover=epochFromMouseX(c,e);raf();});
  c.addEventListener("mouseleave",()=>{S.hover=-1;raf();});
}

let rafId=0;
function raf(){if(!rafId)rafId=requestAnimationFrame(()=>{rafId=0;redrawAll();});}

// Ground Track events
(function(){
  const c=document.getElementById("gt-canvas");
  c.addEventListener("wheel",e=>{
    e.preventDefault();
    const factor=e.deltaY>0?1.15:1/1.15;
    const rect=c.getBoundingClientRect();
    const mx=(e.clientX-rect.left)/rect.width, my=(e.clientY-rect.top)/rect.height;
    const oldS=S.gt.scale; S.gt.scale*=factor;
    // Zoom toward cursor
    S.gt.cx+=(mx-0.5)*(oldS-S.gt.scale);
    S.gt.cy-=(my-0.5)*(oldS-S.gt.scale);
    raf();
  },{passive:false});

  c.addEventListener("mousedown",e=>{
    S.gt.drag=true; S.gt.lx=e.clientX; S.gt.ly=e.clientY;
    c.style.cursor="grabbing";
  });
  window.addEventListener("mousemove",e=>{
    if(S.gt.drag){
      const rect=c.getBoundingClientRect();
      const dx=(e.clientX-S.gt.lx)/rect.width*S.gt.scale;
      const dy=(e.clientY-S.gt.ly)/rect.height*S.gt.scale;
      S.gt.cx-=dx; S.gt.cy+=dy;
      S.gt.lx=e.clientX; S.gt.ly=e.clientY;
      raf();
    }
  });
  window.addEventListener("mouseup",()=>{
    if(S.gt.drag){S.gt.drag=false; c.style.cursor="crosshair";}
  });

  // Hover: find nearest epoch
  c.addEventListener("mousemove",e=>{
    if(S.gt.drag)return;
    const rect=c.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const pad=8, pw=rect.width-pad*2, ph=rect.height-pad*2;
    const worldX=S.gt.cx+(mx-pad-pw/2)/pw*S.gt.scale;
    const worldY=S.gt.cy-(my-pad-ph/2)/ph*S.gt.scale;
    let best=-1,bestD=Infinity;
    for(let i=0;i<EPOCHS.length;i++){
      if(!S.visStatus[EPOCHS[i].status])continue;
      const dx=EPOCHS[i].east-worldX, dy=EPOCHS[i].north-worldY;
      const d=dx*dx+dy*dy;
      if(d<bestD){bestD=d;best=i;}
    }
    S.hover=best; raf();
  });
  c.addEventListener("mouseleave",()=>{S.hover=-1;raf();});
})();

// Status bar events
(function(){
  const c=document.getElementById("status-bar");
  c.addEventListener("mousemove",e=>{
    const rect=c.getBoundingClientRect();
    S.hover=Math.max(0,Math.min(EPOCHS.length-1,Math.round((e.clientX-rect.left)/rect.width*(EPOCHS.length-1))));
    raf();
  });
  c.addEventListener("mouseleave",()=>{S.hover=-1;raf();});
})();

  Object.keys(S.visSys).forEach(k=>S.visSys[k]=true);

});

// Resize
let resizeT;
window.addEventListener("resize",()=>{clearTimeout(resizeT);resizeT=setTimeout(()=>raf(),150);});

// ===== T. Drag & Drop .pos file loading =====
const dropOverlay=document.getElementById("drop-overlay");
let dragCount=0;
document.addEventListener("dragenter",e=>{e.preventDefault();dragCount++;dropOverlay.classList.add("active");});
document.addEventListener("dragleave",e=>{e.preventDefault();dragCount--;if(dragCount<=0){dragCount=0;dropOverlay.classList.remove("active");}});
document.addEventListener("dragover",e=>e.preventDefault());
document.addEventListener("drop",e=>{
  e.preventDefault();dragCount=0;dropOverlay.classList.remove("active");
  const file=e.dataTransfer.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const text=ev.target.result;
    const parsed=parsePosFile(text);
    if(parsed.length===0){alert("No valid epochs found in file.");return;}
    // Replace EPOCHS
    EPOCHS.length=0;EPOCHS.push(...parsed);
    // Recompute velocity
    for(let i=0;i<EPOCHS.length;i++){
      if(i<EPOCHS.length-1){const dt=EPOCHS[i+1].tow-EPOCHS[i].tow;
        if(dt>0){EPOCHS[i].ve=(EPOCHS[i+1].east-EPOCHS[i].east)/dt;EPOCHS[i].vn=(EPOCHS[i+1].north-EPOCHS[i].north)/dt;EPOCHS[i].vu=(EPOCHS[i+1].up-EPOCHS[i].up)/dt;}
        else{EPOCHS[i].ve=0;EPOCHS[i].vn=0;EPOCHS[i].vu=0;}}
      else{EPOCHS[i].ve=0;EPOCHS[i].vn=0;EPOCHS[i].vu=0;}
    }
    // Reset ground track view
    let mnE=Infinity,mxE=-Infinity,mnN=Infinity,mxN=-Infinity;
    for(const ep of EPOCHS){mnE=Math.min(mnE,ep.east);mxE=Math.max(mxE,ep.east);mnN=Math.min(mnN,ep.north);mxN=Math.max(mxN,ep.north);}
    S.gt.cx=(mnE+mxE)/2;S.gt.cy=(mnN+mxN)/2;
    S.gt.scale=Math.max(mxE-mnE,mxN-mnN,1)*1.15;
    S.gt.initCx=S.gt.cx;S.gt.initCy=S.gt.cy;S.gt.initScale=S.gt.scale;
    S.hover=-1;
    raf();
  };
  reader.readAsText(file);
});

function parsePosFile(text){
  const lines=text.split("\n");
  const isRTKLIB=lines.some(l=>l.includes("rnx2rtkp")||l.includes("rtkpost"));
  const epochs=[];
  const rawLat=[],rawLon=[];
  // First pass: collect lat/lon for reference
  for(const line of lines){
    if(line.startsWith("%")||!line.trim())continue;
    const c=line.trim().split(/\s+/);
    if(c.length<8)continue;
    if(isRTKLIB){rawLat.push(parseFloat(c[2]));rawLon.push(parseFloat(c[3]));}
    else{rawLat.push(parseFloat(c[5]));rawLon.push(parseFloat(c[6]));}
  }
  if(!rawLat.length)return[];
  const rlat=rawLat.reduce((a,b)=>a+b,0)/rawLat.length;
  const rlon=rawLon.reduce((a,b)=>a+b,0)/rawLon.length;
  const d2r=Math.PI/180, RE=6378137;
  const cosR=Math.cos(rlat*d2r);
  // RTKLIB status: 1=Fix,2=Float,3=SBAS,4=DGPS,5=Single,6=PPP
  const rtkSM={1:"FIXED",2:"FLOAT",3:"DGPS",4:"DGPS",5:"SPP",6:"FLOAT"};
  const libSM={1:"SPP",2:"DGPS",3:"FLOAT",4:"FIXED"};
  // Second pass: parse epochs
  let idx=0;
  for(const line of lines){
    if(line.startsWith("%")||!line.trim())continue;
    const c=line.trim().split(/\s+/);
    if(c.length<8)continue;
    let tow,lat,lon,h,status,nsat,pdop,ratio=0,bl=0;
    if(isRTKLIB){
      tow=parseFloat(c[1]);lat=parseFloat(c[2]);lon=parseFloat(c[3]);h=parseFloat(c[4]);
      status=rtkSM[parseInt(c[5])]||"SPP";nsat=parseInt(c[6])||0;
      pdop=0;ratio=c.length>13?parseFloat(c[13]):0;
    }else{
      tow=parseFloat(c[1]);lat=parseFloat(c[5]);lon=parseFloat(c[6]);h=parseFloat(c[7]);
      status=libSM[parseInt(c[8])]||"SPP";nsat=parseInt(c[9])||0;
      pdop=c.length>10?parseFloat(c[10]):0;
      ratio=c.length>11?parseFloat(c[11]):0;
      bl=c.length>12?parseFloat(c[12]):0;
    }
    const east=(lon-rlon)*d2r*RE*cosR;
    const north=(lat-rlat)*d2r*RE;
    const gps=Math.floor(nsat*0.35),glo=Math.floor(nsat*0.18),gal=Math.floor(nsat*0.22),bds=Math.floor(nsat*0.18);
    epochs.push({tow,east:Math.round(east*1000)/1000,north:Math.round(north*1000)/1000,up:Math.round(h*1000)/1000,
      refE:Math.round(east*1000)/1000,refN:Math.round(north*1000)/1000,
      status,nsat,gps,glo,gal,bds,qzss:nsat-gps-glo-gal-bds,
      pdop,hdop:pdop*0.7,vdop:pdop*0.9,ratio,bl,ve:0,vn:0,vu:0});
    idx++;
  }
  // Downsample if >3000
  if(epochs.length>3000){const stride=Math.ceil(epochs.length/3000);return epochs.filter((_,i)=>i%stride===0);}
  return epochs;
}
