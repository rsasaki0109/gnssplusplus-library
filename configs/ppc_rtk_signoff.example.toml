[ppc_rtk_signoff]
dataset_root = "/datasets/PPC-Dataset"
city = "tokyo"
run = "run1"
# Example public benchmark override for one UrbanNav Tokyo run.
# Use this as a Tier-1 smoke/regression row, not as complete receiver coverage.
# rover = "/datasets/UrbanNav-TK-20181219/Odaiba/rover_ublox.obs"
# base = "/datasets/UrbanNav-TK-20181219/Odaiba/base_trimble.obs"
# nav = "/datasets/UrbanNav-TK-20181219/Odaiba/base.nav"
# reference_csv = "/datasets/UrbanNav-TK-20181219/Odaiba/reference.csv"
out = "output/ppc_tokyo_run1_rtk.pos"
summary_json = "output/ppc_tokyo_run1_rtk_summary.json"
max_epochs = 120
rtklib_bin = "/opt/rtklib/bin/rnx2rtkp"
# Optional external receiver-engine solution side-by-side baseline against the
# PPC reference.csv. The public PPC sign-off itself uses bundled survey-grade
# rover/base observations plus reference truth; it does not require this file.
# commercial_pos = "output/ppc_tokyo_run1_commercial_receiver.csv"
# commercial_format = "auto"
# commercial_label = "commercial_receiver"
# commercial_matched_csv = "output/ppc_tokyo_run1_commercial_receiver_matches.csv"
# UrbanNav matrix row: solve commercial receiver rover observations against
# the same base/nav/reference, then compare that .pos against the primary rover.
# This is observation-stream comparison, not proprietary Trimble RTK engine output.
# commercial_rover = "/datasets/UrbanNav-TK-20181219/Odaiba/rover_trimble.obs"
# commercial_base = "/datasets/UrbanNav-TK-20181219/Odaiba/base_trimble.obs"
# commercial_nav = "/datasets/UrbanNav-TK-20181219/Odaiba/base.nav"
# commercial_out = "output/ppc_tokyo_odaiba_trimble_net_r9.pos"
# commercial_label = "trimble_net_r9"
# commercial_preset = "survey"
# commercial_matched_csv = "output/ppc_tokyo_odaiba_trimble_net_r9_matches.csv"
preset = "low-cost"
# Optional RTK ionosphere sweep mode: "auto", "off", "iflc", or "est".
# iono = "iflc"
# Optional AR ratio sweep. The six-run coverage profile currently favors 2.4
# over IFLC on low-score Tokyo/Nagoya runs.
# ratio = 2.4
arfilter = true
arfilter_margin = 0.35
min_hold_count = 8
hold_ratio_threshold = 2.6
# Coverage profile matrix uses arfilter = false plus this flag: valid SPP/float
# fallback epochs are kept instead of being removed by the precision-oriented
# kinematic output filter.
# no_kinematic_post_filter = true
require_valid_epochs_min = 100
require_matched_epochs_min = 100
# Positioning rate is matched reference epochs / total reference epochs.
# Keep this separate from fix_rate_min, which is computed over positioned epochs.
# require_positioning_rate_min = 90.0
# require_ppc_score_3d_50cm_ref_min = 80.0
require_fix_rate_min = 95.0
require_median_h_max = 0.06
require_p95_h_max = 0.15
require_max_h_max = 0.50
require_p95_up_max = 0.60
require_mean_sats_min = 18.0
require_solver_wall_time_max = 5.0
require_realtime_factor_min = 4.5
require_effective_epoch_rate_min = 24.0
require_lib_fix_rate_vs_rtklib_min_delta = 0.0
require_lib_median_h_vs_rtklib_max_delta = 0.01
require_lib_p95_h_vs_rtklib_max_delta = 0.02
