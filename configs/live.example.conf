# Example config for `python3 apps/gnss.py rcv --config configs/live.example.conf`

# Choose exactly one rover input:
# rover_ubx=serial:///dev/ttyACM0
# rover_ubx_baud=115200
rover_rtcm=data/rover.rtcm3
base_rtcm=data/base.rtcm3
nav_rinex=data/driving/navigation.nav
out=output/live_solution.pos
format=pos
max_epochs=100
rover_message_limit=0
base_message_limit=0
base_hold_seconds=0.5
ratio=3.0
min_ar_sats=5
elevation_mask_deg=15
glonass_ar=off
quiet=true
