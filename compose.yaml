services:
  gnss-web:
    image: ${LIBGNSSPP_IMAGE:-ghcr.io/rsasaki0109/gnssplusplus-library:develop}
    build:
      context: .
      target: runtime
    command:
      - web
      - --host
      - 0.0.0.0
      - --port
      - "8085"
      - --root
      - /workspace
    ports:
      - "8085:8085"
    volumes:
      - .:/workspace
