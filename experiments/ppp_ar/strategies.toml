[metadata]
name = "ppp_ar_clas_experiments"
reference = "CLASLIB"

[strategies.iflc_float_baseline]
label = "IFLC Float Baseline"
design_style = "monolithic"
status = "baseline"
description = "Current IFLC-first PPP path. This is the control arm for CLAS-oriented work."
claslib_reference = "Control arm used to measure how far CLASLIB-inspired observation-space work actually moves the solver."
extra_args = []
implementation_files = [
  "src/algorithms/ppp.cpp",
]

[strategies.osr_float_pipeline]
label = "OSR Float Pipeline"
design_style = "pipeline"
status = "candidate"
description = "CLASLIB-inspired observation-space path: per-frequency measurements, residual ionosphere estimation, no ambiguity fixing."
claslib_reference = "Mirrors the CLASLIB emphasis on cssr2osr-style corrected observations before ambiguity resolution."
extra_args = [
  "--no-ionosphere-free",
  "--estimate-ionosphere",
]
implementation_files = [
  "src/algorithms/ppp_osr.cpp",
  "src/algorithms/ppp_clas.cpp",
]

[strategies.osr_float_strict_pipeline]
label = "OSR Float Strict Pipeline"
design_style = "pipeline+boundary"
status = "candidate"
description = "Strict CLAS OSR epoch path with per-frequency corrections and no ambiguity fixing."
claslib_reference = "Uses the CLASLIB-style observation-space boundary directly, without falling back to the standard PPP epoch path."
extra_args = [
  "--clas-osr",
  "--clas-epoch-policy",
  "strict-osr",
  "--no-ionosphere-free",
  "--estimate-ionosphere",
]
implementation_files = [
  "src/algorithms/ppp.cpp",
  "src/algorithms/ppp_osr.cpp",
  "src/algorithms/ppp_clas.cpp",
]

[strategies.osr_float_hybrid_pipeline]
label = "OSR Float Hybrid Pipeline"
design_style = "pipeline+fallback"
status = "candidate"
description = "CLASLIB-inspired observation-space path that falls back to the stable standard PPP epoch path when the strict CLAS OSR update cannot run."
claslib_reference = "Uses the CLASLIB-style observation-space boundary, but keeps the stable standard PPP path as an experiment-only fallback to isolate whether the failure is in the OSR builder or in the epoch boundary."
extra_args = [
  "--clas-osr",
  "--clas-epoch-policy",
  "hybrid-standard-ppp",
  "--no-ionosphere-free",
  "--estimate-ionosphere",
]
implementation_files = [
  "src/algorithms/ppp.cpp",
  "src/algorithms/ppp_osr.cpp",
  "src/algorithms/ppp_clas.cpp",
]

[strategies.osr_float_orbit_clock_bias_pipeline]
label = "OSR Float Orbit/Clock/Bias Pipeline"
design_style = "pipeline+semantics"
status = "candidate"
description = "Strict CLAS OSR epoch path that keeps orbit/clock plus bias-side observation corrections, but suppresses CLAS atmosphere application inside accepted updates."
claslib_reference = "Used to test whether the accepted CLAS path improves once correction application is reduced to the CLASLIB-like orbit/clock boundary plus bias semantics, without external atmosphere forcing."
extra_args = [
  "--clas-osr",
  "--clas-epoch-policy",
  "strict-osr",
  "--clas-osr-application",
  "orbit-clock-bias",
  "--no-ionosphere-free",
  "--estimate-ionosphere",
]
implementation_files = [
  "src/algorithms/ppp.cpp",
  "src/algorithms/ppp_osr.cpp",
  "src/algorithms/ppp_clas.cpp",
]

[strategies.osr_float_orbit_clock_only_pipeline]
label = "OSR Float Orbit/Clock-Only Pipeline"
design_style = "pipeline+semantics"
status = "candidate"
description = "Strict CLAS OSR epoch path that keeps geometry and clock updates from the CLAS OSR lane, but suppresses CLAS bias and atmosphere application inside accepted updates."
claslib_reference = "Used to isolate whether the accepted CLAS update path degrades because of bias/atmosphere semantics rather than because of the orbit/clock boundary itself."
