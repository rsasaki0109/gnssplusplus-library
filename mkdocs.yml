site_name: libgnss++
site_description: Modern C++ GNSS/RTK/PPP/CLAS toolkit
site_url: https://rsasaki0109.github.io/gnssplusplus-library/
repo_url: https://github.com/rsasaki0109/gnssplusplus-library
repo_name: rsasaki0109/gnssplusplus-library
docs_dir: docs
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight
markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
nav:
  - Home: index.md
  - Architecture: architecture.md
  - Quick Start: quickstart.md
  - Benchmarks: benchmarks.md
  - Validation: validation.md
  - Interfaces: interfaces.md
  - CLAS:
      - Quick Start: clas_quickstart.md
      - API & Flow: clas.md
      - Compact SSR Policies: clas_compact_ssr_policies.md
      - Parity Datasets & Artifacts: clas_parity_artifacts.md
      - Debug Tag Playbook: clas_debug_playbook.md
      - Parity Blockers: clas_parity_blockers.md
  - Track A Benchmark (2018): track_a_benchmark_2018.md
  - SSR2OBS Dump: ssr2obs_dump_implementation.md
  - References:
      - Overview: references/index.md
      - MADOCALIB Gap: references/madocalib-gap.md
      - CLASLIB Gap: references/claslib-gap.md
      - demo5 Gap: references/demo5-gap.md
      - MALIB Ops Gap: references/malib-ops-gap.md
      - laika Gap: references/laika-gap.md
      - PocketSDR Notes: references/pocketsdr-notes.md
      - SignalSim Notes: references/signalsim-notes.md
      - GSILIB Notes: references/gsilib-notes.md
      - Roadmap: references/roadmap.md
  - Contributing: contributing.md
