# MADOCALIB rnx2rtkp config for PPC relative RTK comparison.
#
# Do not set pos1-posmode here. MADOCALIB's config enum only accepts single
# and PPP modes, while the rnx2rtkp CLI default is relative kinematic.
pos1-frequency     =l1+2
pos1-soltype       =forward
pos1-elmask        =15
pos1-dynamics      =off
pos1-ionoopt       =brdc
pos1-tropopt       =saas
pos1-sateph        =brdc
pos1-navsys        =61
pos2-armode        =continuous
pos2-gloarmode     =off
pos2-arthres       =3
pos2-arlockcnt     =5
pos2-arelmask      =0
pos2-aroutcnt      =5
pos2-arminfix      =10
pos2-slipthres     =0.05
pos2-maxage        =30
pos2-rejionno      =30
pos2-rejgdop       =30
pos2-niter         =1
out-solformat      =llh
out-outhead        =on
out-outopt         =on
out-timesys        =gpst
out-timeform       =hms
out-timendec       =3
out-height         =ellipsoidal
out-solstatic      =all
out-outstat        =off
stats-eratio1      =100
stats-eratio2      =100
stats-errphase     =0.003
stats-errphaseel   =0.003
stats-errphasebl   =0
stats-prnaccelh    =1
stats-prnaccelv    =0.1
stats-prnbias      =0.0001
stats-prniono      =0.001
stats-prntrop      =0.0001
stats-clkstab      =5e-12
ant1-postype       =rinexhead
ant2-postype       =rinexhead
misc-timeinterp    =on
