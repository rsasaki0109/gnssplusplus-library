# UrbanNav Tokyo Odaiba RTKLIB baseline: dual-frequency L1+L2.
pos1-posmode       =kinematic
pos1-frequency     =l1+l2
pos1-soltype       =forward
pos1-elmask        =15
pos1-dynamics      =off
pos1-ionoopt       =brdc
pos1-tropopt       =saas
pos1-sateph        =brdc
pos1-navsys        =1
pos2-armode        =continuous
pos2-gloarmode     =off
pos2-arthres       =3
pos2-arlockcnt     =5
pos2-arelmask      =0
pos2-aroutcnt      =5
pos2-arminfix      =10
pos2-slipthres     =0.05
pos2-maxage        =30
pos2-rejionno      =30
pos2-niter         =1
out-solformat      =llh
out-outhead        =on
out-outopt         =on
out-timesys        =gpst
out-height         =ellipsoidal
out-solstatic      =all
out-outstat        =off
stats-errratio     =100
stats-errphase     =0.003
stats-errphaseel   =0.003
stats-errphasebl   =0
stats-prnaccelh    =1
stats-prnaccelv    =0.1
stats-prnbias      =0.0001
stats-prniono      =0.001
stats-prntrop      =0.0001
stats-clkstab      =5e-12
ant1-postype       =rinexhead
ant2-postype       =rinexhead
misc-timeinterp    =on
